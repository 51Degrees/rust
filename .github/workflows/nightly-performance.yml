name: Nightly Performance

# Runs the on-premise performance examples, writes their throughput figures into
# results_<name>.json in the common-ci schema, and uploads them so the shared
# steps/compare-performance.ps1 can chart them on the documentation performance
# graphs. The Rust on-premise engines call the device-detection-cxx and
# ip-intelligence-cxx libraries through FFI, so the figures track native
# performance.
#
# This mirrors the per-language performance steps in common-ci's nightly
# workflows. It is kept self-contained here (rather than calling the shared
# reusable workflow) until the repository joins the shared nightly orchestration
# on GitHub. The comparison step needs historic results from earlier runs, so it
# is best-effort and only produces graphs once a run history exists.

on:
  schedule:
    # 02:00 UTC daily.
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      # 1. The Rust workspace, checked out into a subdirectory named after the
      #    repository so the common-ci script's -RepoName convention matches the
      #    other languages.
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          path: rust
          submodules: recursive

      # 2. The shared common-ci scripts (the Rust performance adapter and the
      #    comparison step).
      - name: Checkout common-ci
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/common-ci
          path: common-ci

      # 3. The C/C++ source repositories the -sys crates compile, plus the data
      #    submodules the performance examples read. They are checked out as
      #    siblings of the rust checkout (at the workspace root, not under a
      #    cxx/ subdirectory) so the examples' data-file finder, which walks up
      #    from the working directory looking for `device-detection-cxx/...` and
      #    `ip-intelligence-cxx/...`, locates the bundled `.hash`/`.ipi` and
      #    User-Agent/evidence files. This also matches the -sys build scripts'
      #    sibling fallback layout.
      - name: Checkout device-detection-cxx
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/device-detection-cxx
          path: device-detection-cxx
          submodules: recursive

      - name: Checkout ip-intelligence-cxx
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/ip-intelligence-cxx
          path: ip-intelligence-cxx
          submodules: recursive

      # 3a. The data files (.hash, .ipi) and the User-Agent / evidence records are
      #     stored in Git LFS inside the *-data submodules. actions/checkout brings
      #     the submodule pointers down but not their LFS content, so fetch it
      #     explicitly, recursing into the submodules. Without this the example
      #     reads an LFS pointer instead of the real data and reports a missing or
      #     corrupt data file.
      - name: Fetch LFS data for the cxx checkouts
        shell: bash
        run: |
          for d in device-detection-cxx ip-intelligence-cxx; do
            git -C "$d" lfs install --local
            git -C "$d" lfs pull
            git -C "$d" submodule foreach --recursive 'git lfs install --local && git lfs pull'
          done

      # 4. Point each -sys build script at its checkout, and the examples at the
      #    Lite/ASN data files in the checked-out data submodules.
      - name: Configure native source and data directories
        shell: bash
        run: |
          echo "FIFTYONE_COMMON_CXX_DIR=${GITHUB_WORKSPACE}/device-detection-cxx/src/common-cxx" >> "$GITHUB_ENV"
          echo "FIFTYONE_DEVICE_DETECTION_CXX_DIR=${GITHUB_WORKSPACE}/device-detection-cxx" >> "$GITHUB_ENV"
          echo "FIFTYONE_IP_INTELLIGENCE_CXX_DIR=${GITHUB_WORKSPACE}/ip-intelligence-cxx" >> "$GITHUB_ENV"
          echo "51DEGREES_DD_PATH=${GITHUB_WORKSPACE}/device-detection-cxx/device-detection-data/51Degrees-LiteV4.1.hash" >> "$GITHUB_ENV"
          echo "51DEGREES_IPI_PATH=${GITHUB_WORKSPACE}/ip-intelligence-cxx/ip-intelligence-data/51Degrees-IPIV4AsnIpiV41.ipi" >> "$GITHUB_ENV"

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # 5. Run the performance examples and write results_<name>.json files under
      #    rust/test-results/performance-summary in the common-ci schema.
      - name: Run performance and write results
        shell: pwsh
        run: ./common-ci/rust/run-performance-tests.ps1 -RepoName rust

      - name: Upload Performance Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance_results-publish-rust
          path: rust/test-results/performance-summary/results_*.json

      # 6. Compare against historic figures and render the graphs. Best-effort:
      #    on a repository without run history the comparison has too few points
      #    and simply records the current figures, so a failure here must not fail
      #    the job.
      - name: Compare performance and render graphs
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The comparison step reads the current results from the working
          # directory, so copy them up from the summary folder it was told to
          # write to.
          Copy-Item rust/test-results/performance-summary/results_*.json . -Force
          $options = @(
            @{ Name = "DeviceDetection-OnPremise"; RunPerformance = $true },
            @{ Name = "IpIntelligence-OnPremise";  RunPerformance = $true }
          )
          ./common-ci/steps/compare-performance.ps1 `
            -RepoName 'rust' `
            -OrgName '51Degrees' `
            -AllOptions $options `
            -Branch '${{ github.ref_name }}'

      - name: Escape Branch Name
        id: escape_branch
        shell: pwsh
        run: '"name=" + ($env:GITHUB_REF_NAME -replace ''[":<>|*?/\\\r\n]'', ''-'') | Out-File $env:GITHUB_OUTPUT -Append'

      - name: Upload Graphed Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: publish_performance_results@${{ steps.escape_branch.outputs.name }}
          path: ${{ github.workspace }}/results_*.json
          if-no-files-found: ignore
          include-hidden-files: true
