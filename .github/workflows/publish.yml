name: Publish

# Publish the 51Degrees crates to crates.io when main changes. The job publishes
# each crate, in dependency order, only when its version is not already on
# crates.io, so an ordinary push to main is a no-op. To release, bump the shared
# version (it is 4.5.1 across the workspace) and merge to main.
#
# Requires a CARGO_REGISTRY_TOKEN repository secret holding a crates.io API token
# with publish rights for the 51Degrees crates. Without it the job skips cleanly.

on:
  push:
    branches: [main]

# Never let two publish runs race; a second push waits for the first to finish.
concurrency:
  group: publish-crates-io
  cancel-in-progress: false

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish workspace crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash ci/publish-crates.sh
