name: Publish

# Publish the 51Degrees crates to crates.io when main changes, in dependency
# order, skipping versions already published. To release, bump the shared
# version and push to main.
#
# Authentication uses crates.io Trusted Publishing: the
# rust-lang/crates-io-auth-action exchanges this run's GitHub OIDC identity for a
# short-lived crates.io token, so no long-lived API token is stored in the
# repository. Each published crate must have this repository and workflow
# registered as a trusted publisher on crates.io (one-time setup, see
# ci/setup-trusted-publishing.sh and https://crates.io/docs/trusted-publishing).

on:
  push:
    branches: [main]

# Never let two publish runs race; a second push waits for the first to finish.
concurrency:
  group: publish-crates-io
  cancel-in-progress: false

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to mint the OIDC token Trusted Publishing exchanges for a
      # short-lived crates.io token.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish workspace crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: bash ci/publish-crates.sh

  # AFTER publish: prove the just-released packages work by building and testing
  # the examples against crates.io (no source.toml patch). The pre-publish check
  # against local source lives in examples.yml.
  verify-published:
    name: examples vs published crates
    needs: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Give the crates.io index a moment to serve the just-published versions,
      # then resolve them and run the examples' tests against the real packages.
      - run: sleep 90
      - run: cargo update
      - run: cargo test
