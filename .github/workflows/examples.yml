name: Examples

# The example crates live in their own workspace (examples/) and depend on the
# PUBLISHED 51Degrees crates from crates.io by default. This workflow is the
# BEFORE-publish gate: it tests the examples against the LOCAL source tree
# (cargo --config source.toml), so a change is validated through the examples
# before it ships. The AFTER-publish check, that the RELEASED packages work,
# runs in publish.yml once a release has been published.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  source:
    name: examples vs local source
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: examples
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Build and test the examples against the local crates via the patch file.
      # Data-file and resource-key gated tests skip cleanly when those are
      # absent, so this validates the build and the offline tests.
      - run: cargo test --config source.toml
