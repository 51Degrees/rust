[package]
publish = false  # internal example/bench crate, not for crates.io
name = "pipeline-examples"
version = "4.5.2"
description = "Runnable pipeline examples for the 51Degrees Rust SDK."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
# Both facades: the pipeline examples build combined pipelines that surface both
# Device Detection and IP Intelligence results. Default features (cloud +
# on-premise) are kept.
fiftyone-device-detection = { version = "4.5.2", path = "../../device-detection" }
fiftyone-ip-intelligence = { version = "4.5.2", path = "../../ip-intelligence" }

# Core pipeline plumbing and the engine traits the examples introspect.
fiftyone-pipeline-core = { version = "4.5.2", path = "../../pipeline-core" }
fiftyone-pipeline-engines = { version = "4.5.2", path = "../../pipeline-engines" }
# The sharded-LRU cache the caching example wraps around an engine.
fiftyone-caching = { version = "4.5.2", path = "../../caching" }
# Brings in ShareUsageElement, which the web examples must add (usage sharing is
# required for web examples, forbidden for console examples). share-usage-transport
# compiles the built-in HTTP sender (off by default so the crate stays
# wasm-buildable).
fiftyone-pipeline-engines-fiftyone = { version = "4.5.2", path = "../../pipeline-engines-fiftyone", features = ["share-usage-transport"] }

# Shared example helpers: resource-key-from-env, data-file path resolvers, the
# data-file-age warning, property-as-string and the sample evidence values.
examples-shared = { version = "4.5.2", path = "../../examples-shared" }

# Web plumbing for the web example: the framework-neutral pipeline plus the axum
# adapter that mounts the two client-side endpoints and the result extractor.
fiftyone-pipeline-web = { version = "4.5.2", path = "../../pipeline-web" }
fiftyone-pipeline-web-axum = { version = "4.5.2", path = "../../pipeline-web-axum" }
# axum 0.8 / tower 0.5 match the versions the web-axum crate already resolves, so
# no second major version is pulled into the graph.
axum.workspace = true
# The `util` feature provides `ServiceExt::oneshot`, used by the web example
# test to exercise the router in-process without binding a socket.
tower = { workspace = true, features = ["util"] }
# The web example needs a real async runtime, the #[tokio::main] macro and
# spawn_blocking (rt-multi-thread + macros), plus the TCP listener it serves on
# (net) and the timer driver the runtime enables (time).
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "time"] }

# Ergonomic error handling for the example `run` functions and `main`.
anyhow = "1"
# YAML reader for the offline and performance examples, which stream evidence
# records from the data submodules. serde_norway is the maintained fork of the
# (now unmaintained) serde_yaml.
serde_norway.workspace = true
# CSV reader for the device-detection "20000 User Agents.csv" evidence file, in
# case a combined-pipeline offline example streams user agents from CSV.
csv.workspace = true
